# In-cluster dnsmasq: the LAN edge resolver for clients with no DNS of their own.
# Naming scheme is <service>.<cluster>.internal (.internal = ICANN-reserved private-use TLD):
#   *.kafka.private-cloud.internal  -> Istio ingress gateway LB (per-broker SNI; wildcard for HPA)
#   pulsar.private-cloud.internal   -> Pulsar proxy LB (single record; proxy fronts all brokers)
# Plus k8s-node/etcd host records, and upstream forwarding for everything else.
# Point your client machine's resolver at this Service's LoadBalancer IP (192.168.0.206).
# Endpoint/IP registry: pulsar-operators/docs/lan-endpoints.md.
#
# Companion to 03/04-* (external Kafka via the Istio gateway).
# IMPORTANT: keep the LB IPs below in sync with the live Service EXTERNAL-IPs.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-dnsmasq
  namespace: pulsar
data:
  dnsmasq.conf: |
    no-resolv
    no-hosts
    server=8.8.8.8
    server=1.1.1.1
    # Low TTL so clients re-resolve quickly if an ingress LB IP changes.
    local-ttl=30
    # Kafka (KSN): per-broker SNI passthrough, so the whole zone wildcards to the
    # Istio ingress gateway LB (covers kafka.* bootstrap + *.kafka.* broker names,
    # incl. HPA scale-up). address=/domain/ip matches the domain and all subdomains.
    address=/kafka.private-cloud.internal/192.168.0.205
    # Pulsar: proxy-fronted, so a single exact record (no wildcard) at the proxy LB.
    host-record=pulsar.private-cloud.internal,192.168.0.200
    # MQTT (MoP): single record at the dedicated MQTT LB (06-mqtt-external.yaml); the
    # broker-side MoP proxy routes across brokers, so no wildcard/per-broker DNS needed.
    host-record=mqtt.private-cloud.internal,192.168.0.207
    # LAN infrastructure records (mirror of the manual /etc/hosts on each node):
    # k8s node + etcd hostnames so clients using this resolver don't need their own
    # /etc/hosts entries. host-record gives forward A + reverse PTR; multiple names
    # per IP are allowed. Keep in sync with node InternalIPs.
    host-record=k8s-node00.kubernetes.net,k8s-node00,etcd-node00,192.168.0.80
    host-record=k8s-node01.kubernetes.net,k8s-node01,etcd-node01,192.168.0.81
    host-record=k8s-node02.kubernetes.net,k8s-node02,etcd-node02,192.168.0.82
    log-queries
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-dnsmasq
  namespace: pulsar
  labels: { app: kafka-dnsmasq }
spec:
  replicas: 2
  selector:
    matchLabels: { app: kafka-dnsmasq }
  template:
    metadata:
      labels: { app: kafka-dnsmasq }
    spec:
      # Spread the 2 replicas one-per-node so a single node outage (e.g. node00)
      # leaves a surviving DNS pod. ScheduleAnyway (not DoNotSchedule) so a pod
      # still schedules if only one node is available rather than going Pending.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: kafka-dnsmasq }
      containers:
        - name: dnsmasq
          image: 4km3/dnsmasq:2.90-r3
          args: ["-k", "--log-facility=-", "--conf-file=/etc/dnsmasq.conf"]
          ports:
            - { name: dns-udp, containerPort: 53, protocol: UDP }
            - { name: dns-tcp, containerPort: 53, protocol: TCP }
          securityContext:
            capabilities:
              add: ["NET_BIND_SERVICE", "NET_ADMIN"]
          # Pull a wedged pod from the LB's endpoints (readiness) and restart it
          # (liveness) so the surviving replica keeps serving.
          readinessProbe:
            tcpSocket: { port: 53 }
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 53 }
            periodSeconds: 20
          volumeMounts:
            - { name: conf, mountPath: /etc/dnsmasq.conf, subPath: dnsmasq.conf }
      volumes:
        - name: conf
          configMap: { name: kafka-dnsmasq }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-dnsmasq
  namespace: pulsar
spec:
  type: LoadBalancer
  selector: { app: kafka-dnsmasq }
  ports:
    - { name: dns-udp, port: 53, targetPort: 53, protocol: UDP }
    - { name: dns-tcp, port: 53, targetPort: 53, protocol: TCP }
